# Standalone deploy of festers on the Oracle box - no tinsnip, no NAS/NFS.
# Runs the GHCR image behind the host Caddy, with runtime state on local disk
# under XDG paths. Works with `docker compose` or `podman compose`.
#
#   cd deploy && cp festers.env.example festers.env   # fill in secrets, once
#   ./update.sh                                        # pull + restart + health-check
#
# See deploy/README.md for the full runbook.
services:
  festers:
    image: ghcr.io/dynamicalsystem/festers:${FESTERS_TAG:-latest}
    container_name: festers
    env_file:
      - festers.env
    environment:
      # Runtime state lives on mounted volumes (below); schedule.json is baked in.
      FESTERS_PLANS_DIR: /app/data/plans
      FESTERS_AUTH_DIR: /app/data/auth
    ports:
      # Bind to loopback only; the host Caddy is the public entrypoint.
      - "127.0.0.1:${FESTERS_PORT:-8000}:8000"
    volumes:
      - ${XDG_STATE_HOME:-${HOME}/.local/state}/dynamicalsystem/festers/plans:/app/data/plans
      - ${XDG_STATE_HOME:-${HOME}/.local/state}/dynamicalsystem/festers/auth:/app/data/auth
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
