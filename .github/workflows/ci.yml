name: ci

# Runs on every PR and on pushes to main. This is the required status check
# that gates both merges and the deploy workflow.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (locked)
        run: uv sync --frozen --group dev

      - name: Run tests
        run: uv run pytest -q
